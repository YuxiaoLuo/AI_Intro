<svg width="480" height="500" viewBox="0 0 480 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" markerWidth="10" markerHeight="6" refX="10" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 10 3, 0 6" fill="#828179"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="480" height="500" rx="6" fill="#F9F9F7"/>

  <!-- Section label: Server -->
  <text x="40" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#828179" font-weight="600">Server</text>

  <!-- Boxes 1–4: server steps -->
  <rect x="40" y="42" width="400" height="48" rx="6" fill="#FFFFFF" stroke="#e6e4dd" stroke-width="1.5"/>
  <text x="240" y="66" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#141413">Input tokens exceed trigger threshold</text>

  <rect x="40" y="126" width="400" height="48" rx="6" fill="#FFFFFF" stroke="#e6e4dd" stroke-width="1.5"/>
  <text x="240" y="150" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#141413">Conversation is summarized</text>

  <rect x="40" y="210" width="400" height="48" rx="6" fill="#FFFFFF" stroke="#e6e4dd" stroke-width="1.5"/>
  <text x="240" y="234" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#141413">Compaction block created with summary</text>

  <rect x="40" y="294" width="400" height="48" rx="6" fill="#FFFFFF" stroke="#e6e4dd" stroke-width="1.5"/>
  <text x="240" y="318" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#141413">Response continues with compacted context</text>

  <!-- Divider: ——— next request ——— -->
  <line x1="40"  y1="370" x2="192" y2="370" stroke="#828179" stroke-width="1" opacity="0.5"/>
  <text x="240" y="370" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" fill="#828179" font-style="italic">next request</text>
  <line x1="288" y1="370" x2="440" y2="370" stroke="#828179" stroke-width="1" opacity="0.5"/>

  <!-- Section label: Client -->
  <text x="40" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#828179" font-weight="600">Client</text>

  <!-- Box 5: client action -->
  <rect x="40" y="404" width="400" height="48" rx="6" fill="#f0ebe3" stroke="#e6e4dd" stroke-width="1.5"/>
  <text x="240" y="428" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#141413">Append response to messages</text>

  <!-- Closing note -->
  <text x="240" y="478" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#828179" font-style="italic">Messages before the compaction block are dropped on next request</text>

  <!-- Arrows: steps 1→2→3→4 -->
  <line x1="240" y1="90"  x2="240" y2="126" stroke="#828179" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="174" x2="240" y2="210" stroke="#828179" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="258" x2="240" y2="294" stroke="#828179" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
